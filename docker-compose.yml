services:
  db:
    image: postgres:16-alpine
    container_name: emarket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: emarket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d emarket"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emarket-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/emarket?schema=public
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"
    command: >
      sh -c "pnpm exec prisma migrate deploy && pnpm start"

volumes:
  postgres-data:
